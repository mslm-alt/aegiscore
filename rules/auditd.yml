- id: AUDIT-CRED-001
  name: Shadow File Read via Auditd EXECVE
  severity: critical
  score: 92
  category: process
  message: /etc/shadow erişimi için okuma/staging komutu çalıştırıldı
  summary: Bu kural, normalize edilen olay alanları tanımlı kalıp veya içerik koşullarıyla eşleştiğinde Shadow File Read via Auditd EXECVE davranışını görünür kılar; bu sinyal hesap keşfi, parola denemesi veya yetkisiz erişim riskini gösterir.
  condition:
    source: auditd
    action: exec
    fields:
      __all__:
      - cmdline_contains: /etc/shadow
      - __any__:
        - cmdline_token_contains_any:
          - cat
          - head
          - tail
          - grep
          - awk
          - sed
          - strings
          - base64
          - python
          - python3
          - perl
        - cmdline_contains: unshadow
      - __not__:
          __any__:
          - cmdline_token_contains_any:
            - passwd
            - chage
            - vipw
            - usermod
            - pwconv
            - pwunconv
          - cmdline_contains_any:
            - authselect
            - osqueryi
            - aide
            - tripwire
