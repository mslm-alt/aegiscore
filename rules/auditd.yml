  summary_tr: Bu kural, normalize edilen olayda `lotl_exec` aksiyonu gözlendiğinde LotL privilege escalation davranışını görünür kılar; bu sinyal kötüye kullanım veya saldırı zincirinin ilerlemesi riskini gösterir.
  operator_note_en: Review the process or execution context, AUID, UID, and tty details, accessed path or syscall details, host and event time, and the immediately preceding or following process, auth, file-access, or persistence events.
  operator_note_tr: Process/exec bağlamını, auid/uid/tty bilgilerini, erişilen path veya syscall detaylarını, host ve olay zamanını ve hemen önceki/sonraki process, auth, file-access veya persistence olaylarını kontrol edin.
