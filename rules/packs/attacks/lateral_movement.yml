- id: ATK-LM-001
  name: Birden Fazla Host SSH (İlk Kez)
  severity: high
  score: 75
  category: auth
  message: Kullanıcı daha önce SSH yapmadığı bir hedefe bağlandı — lateral movement şüphesi
  summary: Bu kural, daha önce görülmemiş bir kaynak, kullanıcı, süreç veya davranış ilk kez ortaya çıktığında Birden Fazla Host SSH (İlk Kez) davranışını görünür kılar; bu sinyal hesap keşfi, parola denemesi veya yetkisiz erişim riskini gösterir.
  mitre_tactic: TA0008
  mitre_technique: T1021
  mitre_subtechnique: T1021.004
  tags:
  - lateral-movement
  - ssh
  - remote-services
  pack: attacks
  pack_version: '1.1'
  cooldown: 3600
  condition:
    action: ssh_login
    outcome: success
    user: '!root'
    first_seen: user_ip_pair
  operator_note: Kaynak IP, hedef kullanıcı hesabı, host, olay zamanı, tty/oturum bağlamı ve hemen önceki/sonraki başarısız giriş, başarılı giriş, sudo, su, lockout veya parola değişimi olaylarını kontrol edin.
  message_en: SSH Across Multiple Hosts (First Seen)
  message_tr: Kullanıcı daha önce SSH yapmadığı bir hedefe bağlandı — lateral movement şüphesi
  summary_en: This rule highlights ssh across multiple hosts (first seen) and may indicate suspicious or unauthorized auth activity. Review the surrounding context to confirm the impact.
  summary_tr: Bu kural, daha önce görülmemiş bir kaynak, kullanıcı, süreç veya davranış ilk kez ortaya çıktığında Birden Fazla Host SSH (İlk Kez) davranışını görünür kılar; bu sinyal hesap keşfi, parola denemesi veya yetkisiz erişim riskini gösterir.
  operator_note_en: Review the source IP, target user account, host, event time, tty or session context, and the immediately preceding or following failed login, successful login, sudo, su, lockout, or password change events.
  operator_note_tr: Kaynak IP, hedef kullanıcı hesabı, host, olay zamanı, tty/oturum bağlamı ve hemen önceki/sonraki başarısız giriş, başarılı giriş, sudo, su, lockout veya parola değişimi olaylarını kontrol edin.
