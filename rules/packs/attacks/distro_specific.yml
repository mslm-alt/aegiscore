- id: PKG-012
  name: Package Manager Security Control Removal Command
  severity: critical
  score: 91
  category: process
  message: Paket yöneticisi ile güvenlik kontrolü kaldırma komutu görüldü
  summary: dnf, yum veya zypper üzerinden audit/log/firewall/SSH gibi güvenlik bileşenlerini kaldırmaya yönelik komut görüldü. Bu sinyal savunma kaçınma veya erişim sonrası sertleştirme bozma davranışına işaret edebilir.
  condition:
    source:
    - auditd
    - syslog
    - journald
    - dnf
    - zypper
    action:
    - sudo
    - exec
    - process_exec
    - lotl_exec
    - pkg_event
    fields:
      __all__:
      - __any__:
        - command_regex: (?:^|\s)(?:/\S+/)?(?:dnf|yum)\s+(?:-[^\s]+\s+)*(?:remove|erase)\s+(?:-[^\s]+\s+)*(?:auditd|rsyslog|systemd-journald|journald|firewalld|openssh-server|openssh|aide|fail2ban|clamav)\b
        - command_regex: (?:^|\s)(?:/\S+/)?zypper\s+(?:-[^\s]+\s+)*(?:remove|rm)\s+(?:-[^\s]+\s+)*(?:auditd|rsyslog|firewalld|openssh(?:-server)?|aide|fail2ban|clamav)\b
      - __not__:
          __any__:
          - command_contains_any:
            - ansible
            - ansible-playbook
            - chef-client
            - puppet
            - salt-call
            - salt-minion
            - subscription-manager
            - SUSEConnect
            - transactional-update
            - packagekit
  mitre_tactic: TA0005
  mitre_technique: T1562.001
  tags:
  - package-manager
  - defense-evasion
  - security-tool-removal
  - rhel
  - suse
  pack: distro
  pack_version: '1.0'
  operator_note: Kaldırılmak istenen paketi, komutu başlatan kullanıcıyı, aynı hosttaki hemen önceki auth/persistence activity’sini ve arkasından gelen service stop veya log tamper sinyallerini kontrol edin.
  message_en: Package Manager Security Control Removal Command
  message_tr: Paket yöneticisi ile güvenlik kontrolü kaldırma komutu görüldü
  summary_en: A package-manager command attempted to remove a security control such as audit, logging, firewall, or SSH components. This can indicate defense evasion or hardening rollback after access.
  summary_tr: dnf, yum veya zypper üzerinden audit/log/firewall/SSH gibi güvenlik bileşenlerini kaldırmaya yönelik komut görüldü. Bu sinyal savunma kaçınma veya erişim sonrası sertleştirme bozma davranışına işaret edebilir.
  operator_note_en: Review the package targeted for removal, the acting user, nearby auth or persistence activity on the same host, and any following service-stop or log-tamper signals.
  operator_note_tr: Kaldırılmak istenen paketi, komutu başlatan kullanıcıyı, aynı hosttaki hemen önceki auth/persistence activity’sini ve arkasından gelen service stop veya log tamper sinyallerini kontrol edin.
