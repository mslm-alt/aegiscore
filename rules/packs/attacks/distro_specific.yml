  category: process
  message: Paket deposu ekleme/kaldırma veya güvenlik zayıflatıcı repo komutu görüldü
  summary: dnf, yum veya zypper üzerinden yeni repo ekleme, repo kaldırma veya gpg doğrulamasını zayıflatma davranışı görüldü. Bu sinyal zararlı paket kaynağı ekleme veya mevcut güvenli repo akışını bozma riski taşır.
  condition:
    source:
    - auditd
    - syslog
    - journald
    - dnf
    - zypper
    action:
    - sudo
    - exec
    - process_exec
    - lotl_exec
    - pkg_event
    fields:
      __all__:
      - __any__:
        - command_regex: (?:^|\s)(?:/\S+/)?(?:dnf|yum)\b.*\bconfig-manager\b.*(?:--add-repo|--setopt\s+[^\s=]+(?:gpgcheck|repo_gpgcheck|sslverify)=0)
        - command_regex: (?:^|\s)(?:/\S+/)?yum-config-manager\b.*(?:--add-repo|--setopt\s+[^\s=]+(?:gpgcheck|repo_gpgcheck|sslverify)=0)
        - command_regex: (?:^|\s)(?:/\S+/)?zypper\s+(?:-[^\s]+\s+)*(?:ar|addrepo)\b
        - command_regex: (?:^|\s)(?:/\S+/)?zypper\s+(?:-[^\s]+\s+)*(?:rr|removerepo)\b
      - __not__:
          __any__:
          - command_contains_any:
            - zypper refresh
            - zypper update
            - zypper patch
            - dnf check-update
            - yum check-update
            - dnf update
            - yum update
            - subscription-manager
            - SUSEConnect
            - transactional-update
            - ansible
            - ansible-playbook
            - chef-client
            - puppet
            - salt-call
            - salt-minion
  mitre_tactic: TA0005
  mitre_technique: T1562.001
  tags:
  - package-manager
  - repo
  - config-tamper
  - rhel
  - suse
  pack: distro
  pack_version: '1.0'
  operator_note: Yeni veya kaldırılan repo tanımını, kullanılan URL veya alias bilgisini, gpg doğrulama seçeneklerini ve hemen sonrasında gelen install/update activity’sini kontrol edin.
  message_en: Suspicious Package Repository Manipulation
  message_tr: Paket deposu ekleme/kaldırma veya güvenlik zayıflatıcı repo komutu görüldü
  summary_en: A package-manager command added or removed a repository, or weakened repository trust checks such as GPG verification. This can indicate malicious package-source onboarding or security-policy degradation.
  summary_tr: dnf, yum veya zypper üzerinden yeni repo ekleme, repo kaldırma veya gpg doğrulamasını zayıflatma davranışı görüldü. Bu sinyal zararlı paket kaynağı ekleme veya mevcut güvenli repo akışını bozma riski taşır.
  operator_note_en: Review the new or removed repository definition, the URL or alias used, the trust-check settings, and any install or update activity that followed.
  operator_note_tr: Yeni veya kaldırılan repo tanımını, kullanılan URL veya alias bilgisini, gpg doğrulama seçeneklerini ve hemen sonrasında gelen install/update activity’sini kontrol edin.
- id: PKG-014
  name: Package Repository Config Tamper
  severity: high
  score: 84
  category: filesystem
  message: Paket deposu veya abonelik yapılandırmasında yazma/değiştirme görüldü
  summary: auditd üzerinden repo veya abonelik yapılandırma yollarında yazma/değiştirme sinyali görüldü. Bu durum zararlı repo ekleme, güven zinciri zayıflatma veya distro package flow manipülasyonu anlamına gelebilir.
  condition:
    source: auditd
    action: sensitive_file_access
    fields:
      __all__:
      - write_access: true
      - file_path_contains_any:
        - /etc/yum.repos.d/
        - /etc/dnf/
        - /etc/zypp/repos.d/
        - /etc/zypp/credentials.d/
        - /etc/rhsm/rhsm.conf
      - __not__:
          comm_contains_any:
          - dnf
          - yum
          - zypper
          - packagekit
          - subscription-manager
          - SUSEConnect
          - transactional-update
          - ansible
          - puppet
          - chef-client
          - salt-call
          - salt-minion
  mitre_tactic: TA0005
  mitre_technique: T1562.001
  tags:
  - package-manager
  - repo
  - config-tamper
  - auditd
  - rhel
  - suse
  pack: distro
  pack_version: '1.0'
  operator_note: Değiştirilen repo veya abonelik dosyasını, yazan process/uid bağlamını, yeni baseurl/gpg ayarlarını ve hemen sonrasında gelen package install/update activity’sini kontrol edin.
  message_en: Package Repository Config Tamper
  message_tr: Paket deposu veya abonelik yapılandırmasında yazma/değiştirme görüldü
  summary_en: auditd reported write or modification activity under repository or subscription configuration paths. This can indicate malicious repo onboarding, weakened trust settings, or distro package-flow manipulation.
  summary_tr: auditd üzerinden repo veya abonelik yapılandırma yollarında yazma/değiştirme sinyali görüldü. Bu durum zararlı repo ekleme, güven zinciri zayıflatma veya distro package flow manipülasyonu anlamına gelebilir.
  operator_note_en: Review the modified repository or subscription file, the writing process or UID context, the new baseurl or GPG settings, and any package install or update activity that followed.
  operator_note_tr: Değiştirilen repo veya abonelik dosyasını, yazan process/uid bağlamını, yeni baseurl/gpg ayarlarını ve hemen sonrasında gelen package install/update activity’sini kontrol edin.
  summary_en: This rule highlights Suspicious Tool Installed via Package Manager when the normalized event fields match the defined patterns or content conditions. This signal indicates a risk of suspicious process execution and post-compromise abuse.
  summary_tr: Bu kural, normalize edilen olay alanları tanımlı kalıp veya içerik koşullarıyla eşleştiğinde Suspicious Tool Installed via Package Manager davranışını görünür kılar; bu sinyal şüpheli süreç yürütme ve erişim sonrası kötüye kullanım riskini gösterir.
  operator_note_en: Review the affected user, process name, parent process, and command-line context, along with the host, event time, accessed path or socket details, and the immediately preceding or following network, secret, persistence, or defense-evasion events.
  operator_note_tr: İlgili kullanıcıyı, process adını, parent process ve cmdline bağlamını, host ve olay zamanını, erişilen path veya socket bilgisini ve hemen önceki/sonraki network, secret, persistence veya defense-evasion olaylarını kontrol edin.
