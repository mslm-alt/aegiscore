- id: LOL-001
  name: Curl Pipe Shell
  severity: critical
  score: 95
  category: process
  message: curl çıktısı doğrudan shell'e yönlendirildi — uzaktan kod çalıştırma
  summary: Bu kural, normalize edilen olay alanları tanımlı kalıp veya içerik koşullarıyla eşleştiğinde Curl Pipe Shell davranışını görünür kılar; bu sinyal şüpheli süreç yürütme ve erişim sonrası kötüye kullanım riskini gösterir.
  mitre_tactic: TA0002
  mitre_technique: T1059
  mitre_subtechnique: T1059.004
  tags:
  - lolbin
  - execution
  - curl
  - pipe
  - remote-code
  pack: attacks
  pack_version: '2.1'
  condition:
    action: process_exec
    fields:
      exec_full_contains: curl
      exec_full_contains_any:
