- id: WEB-019
  name: Suspicious HTTP Method Probe
  severity: medium
  score: 58
  category: network
  message: Şüpheli veya riskli HTTP method kullanımı tespit edildi
  summary: TRACE, PROPFIND, DEBUG veya benzeri method'lar ile yapılan istekler; web keşfi, yanlış yapılandırma yoklaması veya istismar öncesi doğrulama davranışına işaret edebilir.
