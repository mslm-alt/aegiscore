- id: WEB-017
  name: Suspicious Web Exploit or Upload With Post-Exploit Potential
  severity: high
  score: 88
  category: network
  message: Post-exploitation riski taşıyan şüpheli web exploit veya upload isteği tespit edildi
  summary: İstek; shell upload, traversal, SQLi veya komut çalıştırmaya dönebilecek payload kalıplarını bir araya getiriyor. Bu sinyal, ilk erişimin başarıya dönüşüp sunucu üzerinde komut yürütme veya kalıcılık aşamasına ilerleme riskinin yüksek olduğunu gösterir.
  operator_note: Hedef URL ve parametreleri, HTTP durum kodunu, ilgili web worker process zincirini ve hemen sonrasında gelen process, dosya erişimi, secret okuma veya persistence sinyallerini birlikte inceleyin.
  mitre_tactic: TA0001
  mitre_technique: T1190
  tags:
  - web
  - exploit
  - webshell
  - post-exploitation
  pack: web
  pack_version: '1.0'
  condition:
    source:
    - apache2
    - nginx
    action:
    - shell_upload
    - path_traversal
    - sqli_attempt
    - http_request
    fields:
      __all__:
      - __any__:
        - attack_contains_any:
          - shell_upload
          - path_traversal
          - sql_injection
        - path_decoded_lc_contains_any:
          - cmd=
          - exec=
          - command=
          - /bin/sh
          - /bin/bash
          - ../
          - /etc/passwd
          - .php.jpg
          - .phtml
          - .jsp
        - path_lc_contains_any:
          - '%24%28id%29'
          - '%60id%60'
          - '%252e%252e%252f'
          - .php%00
          - .php.jpg
          - .phtml
          - .jsp
      - __not__:
          __any__:
          - path_decoded_lc_contains_any:
            - /admin/upload
            - /admin/media
            - /wp-admin/
            - /server-status
            - /server-info
            - /health
            - /healthz
            - /readyz
            - /livez
            - /status
          - ua_lc_contains_any:
            - kube-probe
            - prometheus
            - elb-healthchecker
  message_en: Suspicious Web Exploit or Upload With Post-Exploit Potential
  message_tr: Post-exploitation riski taşıyan şüpheli web exploit veya upload isteği tespit edildi
  summary_en: This rule highlights suspicious web exploit or upload with post-exploit potential and may indicate suspicious or unauthorized network activity. Review the surrounding context to confirm the impact.
