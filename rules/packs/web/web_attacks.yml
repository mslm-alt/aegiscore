  operator_note_en: Review the relevant source, user, host, time window, and surrounding network activity to determine whether the alert reflects expected behavior or suspicious activity.
  operator_note_tr: Hedef URL ve parametreleri, HTTP durum kodunu, ilgili web worker process zincirini ve hemen sonrasında gelen process, dosya erişimi, secret okuma veya persistence sinyallerini birlikte inceleyin.
