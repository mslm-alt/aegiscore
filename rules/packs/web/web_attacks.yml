            - /.env
            - wp-config.php
            - /phpmyadmin
            - /admin
            - /cgi-bin/
          - path_lc_contains_any:
            - /server-status
            - /server-info
            - /.git/
            - /.env
            - wp-config.php
            - /phpmyadmin
            - /admin
            - /cgi-bin/
          - ua_lc_contains_any:
            - curl/
            - wget/
            - python-requests
            - sqlmap
            - nikto
            - gobuster
            - dirbuster
            - wfuzz
            - nuclei
            - nmap
            - masscan
  operator_note: Method değerini, hedef URL/path'i, user-agent bilgisini ve aynı kaynaktan gelen 404, exploit veya upload denemelerini birlikte inceleyin.
