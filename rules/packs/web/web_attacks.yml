  mitre_technique: T1595
  tags:
  - web
  - reconnaissance
  - risky-method
  - method-probe
  pack: web
  pack_version: '1.0'
  condition:
    action: http_request
    source:
    - apache2
    - nginx
    fields:
      __any__:
      - method_regex: (?i)^(trace|debug|propfind|connect|track|search|mkcol|move|copy)$
      - __all__:
        - method_regex: (?i)^options$
        - __any__:
          - path_decoded_lc_contains_any:
            - /server-status
            - /server-info
