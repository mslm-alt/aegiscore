- id: FW-002
  name: Firewall Service Disabled Or Stopped
  severity: high
  score: 84
  category: network
  message: Firewall servisi durduruldu, devre dışı bırakıldı veya maskelendi
  summary: UFW, firewalld, nftables veya SuSEfirewall2 servisinin durdurulması ya da devre dışı bırakılması gözlendi. Bu sinyal, ağ savunmasının bilerek zayıflatılmasına veya savunma kaçınmasına işaret edebilir.
  condition:
    action:
    - sudo
    - process_exec
    - exec
    - firewalld_stopped
    - susefirewall_stopped
    fields:
      __any__:
      - firewall_control_contains_any:
        - stop
        - disable
        - mask
      - sudo_command_regex: (?:^|\s)(?:ufw(?:\s+--force)?\s+disable\b|systemctl\s+(?:stop|disable|mask)\s+(?:ufw|firewalld|nftables)\b|service\s+(?:ufw|firewalld)\s+stop\b)
      - cmdline_regex: (?:^|\s)(?:ufw(?:\s+--force)?\s+disable\b|systemctl\s+(?:stop|disable|mask)\s+(?:ufw|firewalld|nftables)\b|service\s+(?:ufw|firewalld)\s+stop\b)
  mitre_tactic: TA0005
  mitre_technique: T1562.004
  tags:
  - defense-evasion
  - firewall
  - service-stop
  pack: core
  pack_version: '1.0'
  operator_note: İşlemi yapan kullanıcıyı, komut bağlamını, hizmet adını ve hemen önceki/sonraki network, auth veya persistence olaylarını inceleyin. Beklenen bakım penceresi dışında görülüyse kritik öncelikle ele alın.
  message_en: Firewall Service Disabled Or Stopped
  message_tr: Firewall servisi durduruldu, devre dışı bırakıldı veya maskelendi
  summary_en: A firewall service such as UFW, firewalld, nftables, or SuSEfirewall2 was stopped, disabled, or masked. This may indicate deliberate weakening of network defenses or defense evasion.
  summary_tr: UFW, firewalld, nftables veya SuSEfirewall2 servisinin durdurulması ya da devre dışı bırakılması gözlendi. Bu sinyal, ağ savunmasının bilerek zayıflatılmasına veya savunma kaçınmasına işaret edebilir.
  operator_note_en: Review the acting user, command context, affected service name, and adjacent network, auth, or persistence events. Treat it as high priority if it occurred outside an expected maintenance window.
  operator_note_tr: İşlemi yapan kullanıcıyı, komut bağlamını, hizmet adını ve hemen önceki/sonraki network, auth veya persistence olaylarını inceleyin. Beklenen bakım penceresi dışında görülüyse kritik öncelikle ele alın.
- id: FW-003
  name: Firewall Policy Flush Or Reset
  severity: critical
  score: 92
  category: network
  message: Firewall kural seti temizlendi, sıfırlandı veya panic modu değiştirildi
  summary: UFW reset, iptables flush, nft flush ruleset veya firewalld complete-reload/panic kontrolü gibi aktif politika temizleme veya sıfırlama davranışı gözlendi. Bu sinyal koruyucu kuralların kaldırılmasına işaret edebilir.
  condition:
    action:
    - sudo
    - process_exec
    - exec
    fields:
      __all__:
      - __any__:
        - sudo_command_regex: (?:^|\s)(?:ufw\s+reset\b|iptables\s+(?:-F|--flush)\b|nft\s+flush\s+ruleset\b|firewall-cmd\s+--complete-reload\b|firewall-cmd\s+--panic-(?:on|off)\b)
        - cmdline_regex: (?:^|\s)(?:ufw\s+reset\b|iptables\s+(?:-F|--flush)\b|nft\s+flush\s+ruleset\b|firewall-cmd\s+--complete-reload\b|firewall-cmd\s+--panic-(?:on|off)\b)
      - __not__:
          __any__:
          - sudo_command_contains_any:
            - ufw status
            - firewall-cmd --state
            - firewall-cmd --list-all
            - firewall-cmd --get-active-zones
          - cmdline_contains_any:
            - ufw status
            - firewall-cmd --state
            - firewall-cmd --list-all
            - firewall-cmd --get-active-zones
  mitre_tactic: TA0005
  mitre_technique: T1562.004
  tags:
  - defense-evasion
  - firewall
  - flush
  - reset
  pack: core
  pack_version: '1.0'
  operator_note: Komutun bakım bağlamını, aynı zaman penceresindeki service stop/disable sinyallerini ve ardından beklenmedik inbound/outbound erişim artışı olup olmadığını kontrol edin.
  message_en: Firewall Policy Flush Or Reset
  message_tr: Firewall kural seti temizlendi, sıfırlandı veya panic modu değiştirildi
  summary_en: A firewall policy flush or reset operation such as UFW reset, iptables flush, nft flush ruleset, or firewalld complete-reload/panic control was observed. This may indicate removal of protective rules.
  summary_tr: UFW reset, iptables flush, nft flush ruleset veya firewalld complete-reload/panic kontrolü gibi aktif politika temizleme veya sıfırlama davranışı gözlendi. Bu sinyal koruyucu kuralların kaldırılmasına işaret edebilir.
  operator_note_en: Review the maintenance context of the command, any adjacent service stop or disable signals, and whether unexpected inbound or outbound access increased afterwards.
  operator_note_tr: Komutun bakım bağlamını, aynı zaman penceresindeki service stop/disable sinyallerini ve ardından beklenmedik inbound/outbound erişim artışı olup olmadığını kontrol edin.
- id: FW-004
  name: Broad Firewall Allow Rule
  severity: high
  score: 82
  category: network
  message: Aşırı geniş kapsamlı firewall allow/accept kuralı eklendi
  summary: Any/any veya 0.0.0.0/0 benzeri geniş kapsama sahip bir UFW, firewalld, iptables veya nftables allow kuralı gözlendi. Bu durum istemeden geniş açıklık yaratabilir veya kasıtlı savunma zayıflatma belirtisi olabilir.
  condition:
    action:
    - sudo
    - process_exec
    - exec
    fields:
      __any__:
      - sudo_command_regex: (?:^|\s)ufw\s+allow\b.*\bfrom\s+any\b.*\bto\s+any\b
      - cmdline_regex: (?:^|\s)ufw\s+allow\b.*\bfrom\s+any\b.*\bto\s+any\b
      - sudo_command_regex: firewall-cmd\b.*--add-rich-rule=.*(?:0\.0\.0\.0/0|::/0|source address="?any"?).*\baccept\b
      - cmdline_regex: firewall-cmd\b.*--add-rich-rule=.*(?:0\.0\.0\.0/0|::/0|source address="?any"?).*\baccept\b
      - sudo_command_regex: (?:^|\s)iptables\b.*(?:-P\s+(?:INPUT|FORWARD)\s+ACCEPT\b|-A\s+(?:INPUT|FORWARD)\b.*(?:0\.0\.0\.0/0|::/0).*\s-j\s+ACCEPT\b)
      - cmdline_regex: (?:^|\s)iptables\b.*(?:-P\s+(?:INPUT|FORWARD)\s+ACCEPT\b|-A\s+(?:INPUT|FORWARD)\b.*(?:0\.0\.0\.0/0|::/0).*\s-j\s+ACCEPT\b)
      - sudo_command_regex: (?:^|\s)nft\b.*\b(?:add|insert)\s+rule\b.*\b(?:ip\s+saddr\s+0\.0\.0\.0/0|ip6\s+saddr\s+::/0)\b.*\baccept\b
      - cmdline_regex: (?:^|\s)nft\b.*\b(?:add|insert)\s+rule\b.*\b(?:ip\s+saddr\s+0\.0\.0\.0/0|ip6\s+saddr\s+::/0)\b.*\baccept\b
  mitre_tactic: TA0005
  mitre_technique: T1562.004
  tags:
  - firewall
  - policy-change
  - broad-allow
  pack: core
  pack_version: '1.0'
  operator_note: Eklenen kuralın scope'unu, hedef zone/interface'i, kaynak aralığını ve değişikliğin bakım süreci kapsamında olup olmadığını doğrulayın.
  message_en: Broad Firewall Allow Rule
  message_tr: Aşırı geniş kapsamlı firewall allow/accept kuralı eklendi
  summary_en: A broad firewall allow or accept rule covering any/any or 0.0.0.0/0 style scope was added. This may create unintended exposure or indicate intentional weakening of defenses.
  summary_tr: Any/any veya 0.0.0.0/0 benzeri geniş kapsama sahip bir UFW, firewalld, iptables veya nftables allow kuralı gözlendi. Bu durum istemeden geniş açıklık yaratabilir veya kasıtlı savunma zayıflatma belirtisi olabilir.
  operator_note_en: Validate the scope of the added rule, the target zone or interface, the source range, and whether the change was part of a legitimate maintenance process.
  operator_note_tr: Eklenen kuralın scope'unu, hedef zone/interface'i, kaynak aralığını ve değişikliğin bakım süreci kapsamında olup olmadığını doğrulayın.
- id: FW-005
  name: Firewall Security Rule Removal
  severity: high
  score: 80
  category: network
  message: Firewall rich-rule veya güvenlik kuralı kaldırıldı
  summary: firewalld rich-rule kaldırma, iptables delete veya nft delete rule benzeri bir firewall kural silme davranışı gözlendi. Bu durum mevcut güvenlik politikasını gevşetebilir.
  condition:
    action:
    - sudo
    - process_exec
    - exec
    fields:
      __any__:
      - sudo_command_regex: firewall-cmd\b.*--remove-rich-rule=
      - cmdline_regex: firewall-cmd\b.*--remove-rich-rule=
      - sudo_command_regex: (?:^|\s)iptables\b.*\s-D\s+(?:INPUT|FORWARD|OUTPUT)\b
      - cmdline_regex: (?:^|\s)iptables\b.*\s-D\s+(?:INPUT|FORWARD|OUTPUT)\b
      - sudo_command_regex: (?:^|\s)nft\b.*\bdelete\s+rule\b
      - cmdline_regex: (?:^|\s)nft\b.*\bdelete\s+rule\b
  mitre_tactic: TA0005
  mitre_technique: T1562.004
  tags:
  - firewall
  - policy-removal
  - defense-evasion
  pack: core
  pack_version: '1.0'
  operator_note: Silinen kuralın hangi threat veya erişim kontrolünü sağladığını, değişikliğin kim tarafından yapıldığını ve hemen sonrasında beklenmedik erişim artışı olup olmadığını kontrol edin.
  message_en: Firewall Security Rule Removal
  message_tr: Firewall rich-rule veya güvenlik kuralı kaldırıldı
  summary_en: A firewall rule removal operation such as firewalld rich-rule deletion, iptables delete, or nft delete rule was observed. This may weaken the existing security policy.
  summary_tr: firewalld rich-rule kaldırma, iptables delete veya nft delete rule benzeri bir firewall kural silme davranışı gözlendi. Bu durum mevcut güvenlik politikasını gevşetebilir.
  operator_note_en: Determine which threat or access control the removed rule enforced, who made the change, and whether unexpected access increased immediately afterwards.
  operator_note_tr: Silinen kuralın hangi threat veya erişim kontrolünü sağladığını, değişikliğin kim tarafından yapıldığını ve hemen sonrasında beklenmedik erişim artışı olup olmadığını kontrol edin.
- id: FW-006
  name: Firewall Config Tamper
  severity: high
  score: 86
  category: filesystem
  message: Firewall yapılandırma dosyasında yazma/değiştirme görüldü
  summary: auditd üzerinden `/etc/ufw`, `/etc/firewalld`, `/etc/sysconfig/iptables` veya `/etc/nftables.conf` altında yazma/değiştirme sinyali görüldü. Bu durum politika manipülasyonu veya savunma kaçınma hazırlığı olabilir.
  condition:
    source: auditd
    action: sensitive_file_access
    fields:
      __all__:
      - write_access: true
      - file_path_contains_any:
        - /etc/ufw
        - /etc/firewalld
        - /etc/sysconfig/iptables
        - /etc/nftables.conf
  mitre_tactic: TA0005
  mitre_technique: T1562.004
  tags:
  - firewall
  - config-tamper
  - auditd
  pack: core
  pack_version: '1.0'
  operator_note: Değiştirilen dosya yolunu, yazan process/uid bağlamını, bakım penceresi bilgisini ve hemen sonrasında gelen rule reload, service stop veya broad allow sinyallerini kontrol edin.
  message_en: Firewall Config Tamper
  message_tr: Firewall yapılandırma dosyasında yazma/değiştirme görüldü
  summary_en: auditd reported write or modification activity under `/etc/ufw`, `/etc/firewalld`, `/etc/sysconfig/iptables`, or `/etc/nftables.conf`. This may indicate policy manipulation or preparation for defense evasion.
  summary_tr: auditd üzerinden `/etc/ufw`, `/etc/firewalld`, `/etc/sysconfig/iptables` veya `/etc/nftables.conf` altında yazma/değiştirme sinyali görüldü. Bu durum politika manipülasyonu veya savunma kaçınma hazırlığı olabilir.
  operator_note_en: Review the modified file path, the writing process or UID context, the maintenance-window context, and any adjacent rule reload, service stop, or broad allow signals.
  operator_note_tr: Değiştirilen dosya yolunu, yazan process/uid bağlamını, bakım penceresi bilgisini ve hemen sonrasında gelen rule reload, service stop veya broad allow sinyallerini kontrol edin.
