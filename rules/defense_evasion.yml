- id: DE-017
  name: Process-Logged Log Sabotage or Audit Reset
  severity: critical
  score: 88
  category: defense_evasion
  message: Process loglarında log sabotage veya denetim reset davranışı görüldü
  cooldown: 120
  condition:
    source:
    - auditd
    - syslog
    - journald
    action:
    - sudo
    - exec
    - process_exec
    - lotl_exec
    fields:
      __all__:
      - __any__:
        - command_contains_any:
          - systemctl stop auditd
          - systemctl disable auditd
          - systemctl mask auditd
          - kill -STOP
          - kill -SIGSTOP
          - pkill -STOP
          - pkill -SIGSTOP
          - killall -STOP
          - killall -SIGSTOP
          - systemctl stop rsyslog
          - systemctl disable rsyslog
          - systemctl mask rsyslog
          - systemctl stop systemd-journald
          - systemctl disable systemd-journald
          - systemctl mask systemd-journald
          - service auditd stop
          - auditctl -D
          - auditctl -e 0
          - truncate -s 0 /var/log/
          - rm -f /var/log/
          - shred /var/log/
          - dd if=/dev/null of=/var/log/
          - journalctl --vacuum-time
          - journalctl --vacuum-size
          - journalctl --vacuum-files
          - rm -rf /var/log/journal
          - history -c
          - unset HISTFILE
          - .bash_history
      - __not__:
          __any__:
          - command_contains_any:
            - systemctl restart auditd
            - systemctl reload auditd
            - service auditd restart
            - service auditd reload
            - logrotate
            - systemctl restart rsyslog
            - systemctl restart systemd-journald
            - systemctl reload rsyslog
            - apt
            - apt-get
            - dpkg
            - rpm
            - dnf
            - yum
