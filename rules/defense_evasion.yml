- id: DE-001
  name: Log Dosyası Temizleme
  severity: critical
  score: 95
  category: defense_evasion
  message: Log dosyası silindi veya truncate edildi — iz örtme girişimi
  cooldown: 60
  condition:
    action: sudo
    outcome: success
    fields:
      sudo_command_contains:
      - truncate -s 0
      - '> /var/log'
      - rm /var/log
      - shred /var/log
      - dd if=/dev/null of=/var/log
      - /var/log/auth.log
      - /var/log/syslog
      - /var/log/secure
      - /var/log/messages
