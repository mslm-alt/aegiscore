- id: DISC-011
  name: Post-Login Suspicious Discovery via Process Logs
  severity: medium
  score: 62
  category: process
  message: Başarılı erişim sonrası şüpheli discovery komutu process loglarda görüldü
  summary: Bu kural, normalize edilen olay alanları tanımlı kalıp veya içerik koşullarıyla eşleştiğinde Post-Login Suspicious Discovery via Process Logs davranışını görünür kılar; bu sinyal keşif, yüzey haritalama ve sonraki saldırı adımlarına hazırlık riskini gösterir.
  cooldown: 180
  condition:
    source:
    - auditd
    - syslog
    - journald
    action:
    - exec
    - process_exec
    - lotl_exec
    fields:
      __all__:
      - __any__:
        - command_contains_any:
          - sudo -l
          - sudo --list
          - doas -L
          - getent group sudo
          - getent group wheel
          - getent group admin
          - grep sudo /etc/group
          - grep wheel /etc/group
          - cat /etc/sudoers
          - cat /etc/sudoers.d
          - ls /etc/sudoers.d
          - cat /etc/doas.conf
          - find / -name id_rsa
          - find / -name id_ed25519
          - find /etc -name *.pem
          - find /etc -name *.key
          - find / -name kubeconfig
          - find /var/lib/kubelet
          - ss -tulpn
          - netstat -tulpn
          - ip neigh
          - arp -a
          - grep COMMAND= /var/log/auth.log
          - grep COMMAND= /var/log/secure
          - 'journalctl -u ssh '
          - 'journalctl -u sshd '
          - dpkg -l sudo
          - rpm -q sudo
          - zypper search -i sudo
      - __not__:
          __any__:
          - command_contains_any:
            - tail -f /var/log/secure
            - tail -f /var/log/auth.log
            - tail -n 100 /var/log/secure
            - tail -n 100 /var/log/auth.log
            - journalctl -u ssh -f
            - journalctl -u sshd -f
            - journalctl -fu ssh
            - journalctl -fu sshd
            - journalctl --unit ssh --follow
            - journalctl --unit sshd --follow
          - command_contains_any:
            - /var/backups/
            - /srv/backup/
            - rsnapshot
            - borg
            - restic
            - duplicity
            - timeshift
            - ansible
            - chef-client
            - puppet
            - salt-call
            - apt
            - apt-get
            - dpkg
            - rpm
            - dnf
            - yum
            - zypper
            - packagekit
            - needrestart
            - landscape-sysinfo
            - motd-news
          - command_token_contains_any:
