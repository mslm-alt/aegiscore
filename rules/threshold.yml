  message_en: High-Entropy DNS Burst
  message_tr: 'Yüksek entropili DNS burst: {count} sorgu ({window} sn) — olası DGA/C2'
  summary_en: This rule highlights a burst of high-entropy DNS lookups when similar events from the same source IP exceed 6 within 300 seconds. The signal can indicate DGA activity, resolver abuse, or staged C2 preparation.
  summary_tr: Bu kural, aynı src ip üzerinde 300 saniyelik pencerede yüksek entropili DNS sorguları 6 eşiğini aştığında burst davranışını görünür kılar; bu sinyal DGA denemesi, resolver abuse veya staged C2 hazırlığına işaret edebilir.
