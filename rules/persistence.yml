- id: PERS-001
  name: Root Crontab Değişikliği
  severity: high
  score: 80
  category: process
  message: Root kullanıcısı crontab dosyasını doğrudan düzenledi — persistence mekanizması şüphesi
  summary: Root bağlamında gerçek crontab değişikliği görüldü; kalıcı görev eklenmiş olabilir.
  operator_note: Crontab diff'ini, komut içeriğini ve değişikliği yapan kullanıcıyı doğrulayın.
  cooldown: 120
  condition:
    action: cron_exec
    user: root
    fields:
      cron_command_contains:
      - crontab -e
      - crontab -r
      - crontab -l
      - echo.*crontab
      - tee.*crontab
      - '> /etc/crontab'
      - '>> /etc/crontab'
      - '> /var/spool/cron'
      - '>> /var/spool/cron'
  mitre_tactic: TA0003
  mitre_technique: T1053.003
  tags:
  - persistence
  - cron
  - root
  - scheduled-task
  - crontab-edit
  pack: core
  pack_version: '1.0'
  message_en: Root Crontab Modification
  message_tr: Root kullanıcısı crontab dosyasını doğrudan düzenledi — persistence mekanizması şüphesi
  summary_en: This rule highlights root crontab modification and may indicate suspicious or unauthorized process activity. Review the surrounding context to confirm the impact.
  summary_tr: Root bağlamında gerçek crontab değişikliği görüldü; kalıcı görev eklenmiş olabilir.
  operator_note_en: Review the relevant source, user, host, time window, and surrounding process activity to determine whether the alert reflects expected behavior or suspicious activity.
  operator_note_tr: Crontab diff'ini, komut içeriğini ve değişikliği yapan kullanıcıyı doğrulayın.
